name: Feature Request
description: Propose a new capability or improvement to tronador-cli.
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. For significant changes, consider opening a discussion first to align on scope before writing code.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      description: Which part of the CLI would this affect?
      options:
        - "aws — resource tagging / metadata"
        - "aws — S3 remediation"
        - "aws — EC2 / VPC"
        - "aws — secrets / KMS"
        - "aws — IAM"
        - "repos — template upgrade / migration"
        - "repos — CICD metadata"
        - "repos — push helpers"
        - "install / packaging (Homebrew, Chocolatey, .deb/.rpm/.apk, installer scripts)"
        - "config / credentials"
        - "cross-platform support (new OS or architecture)"
        - "new subcommand or flag"
        - "developer experience / docs / tooling"
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: |
        What gap or pain point does this address? Concrete examples help.
        Example: "There is no way to filter `aws tag` results by region — the command always processes every configured region."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior, flag, or subcommand change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried workarounds? Why are they insufficient?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, prior art, related issues, or anything else that supports the proposal.
    validations:
      required: false
