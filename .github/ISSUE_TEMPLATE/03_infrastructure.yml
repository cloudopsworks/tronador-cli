name: Documentation Issue
description: Report missing, incorrect, or unclear documentation.
title: "[Docs]: "
labels: ["documentation", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template for problems with the README, inline help text, code comments, or examples.
        For bugs in the CLI itself, use the **Bug Report** template instead.
        For questions, join us on [Community Slack](https://cloudops.works/slack/).

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation type
      options:
        - README
        - CLI help text (`--help` output)
        - Code comments / godoc
        - Example commands or configuration
        - Contributing guide
        - Other
    validations:
      required: true

  - type: dropdown
    id: issue_kind
    attributes:
      label: Issue kind
      options:
        - Missing — information not documented anywhere
        - Incorrect — documented behavior does not match reality
        - Unclear — documented but hard to understand
        - Outdated — accurate at some point but no longer correct
        - Typo / grammar
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Where is the issue?
      description: File path, section heading, or exact command whose `--help` output is affected.
      placeholder: "e.g. README.md > Installation, or `tronador-cli aws tag --help`"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong or missing? Be specific.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you have a proposed fix or wording, share it here.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Related issues, links, or anything else that helps.
    validations:
      required: false
