name: Bug Report
description: Report unexpected behavior in tronador-cli.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please be as specific as possible — it speeds up the fix significantly.
        Check [existing issues](https://github.com/cloudopsworks/tronador-cli/issues) first to avoid duplicates.

  - type: input
    id: cli_version
    attributes:
      label: tronador-cli version
      description: Run `tronador-cli version` or check the release tag you downloaded.
      placeholder: "e.g. v0.1.11"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go version (if building from source)
      description: Output of `go version`. Only required when building from source.
      placeholder: "e.g. go1.22.3 linux/amd64"
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected area
      description: Which part of the CLI is affected?
      options:
        - AWS resource tagging
        - Resource discovery / listing
        - Authentication / credentials
        - Configuration / flags
        - Output / formatting
        - Repository commands
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Run `tronador-cli aws tag --region us-east-1 --resource-type ec2 ...`
        2. Observe error output
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full command output or error message. Do **not** paste AWS credentials or secrets.
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: >
        Relevant configuration, AWS region, resource types involved, or a link to a related issue.
    validations:
      required: false
